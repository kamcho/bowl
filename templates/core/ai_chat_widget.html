<style>
  .ai-chat-widget {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 9999;
    font-family: 'Outfit', sans-serif;
  }

  .ai-chat-bubble {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #f4b942, #d99a2b);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(244, 185, 66, 0.4);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    color: #0c0f14;
  }

  .ai-chat-bubble:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 40px rgba(244, 185, 66, 0.6);
  }

  .ai-chat-window {
    position: absolute;
    bottom: calc(100% + 1.5rem);
    right: 0;
    width: 380px;
    height: 550px;
    background: #121722;
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    display: none;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
  }

  .ai-chat-header {
    padding: 1.5rem;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .ai-chat-header .status-dot {
    width: 10px;
    height: 10px;
    background: #34a853;
    border-radius: 50%;
    box-shadow: 0 0 10px #34a853;
  }

  .ai-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .ai-msg {
    max-width: 85%;
    padding: 0.85rem 1.1rem;
    border-radius: 16px;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .ai-msg--bot {
    background: rgba(255,255,255,0.05);
    color: #e8ecf4;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .ai-msg--user {
    background: var(--accent);
    color: #0c0f14;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }

  .ai-chat-input-area {
    padding: 1.5rem;
    background: rgba(255,255,255,0.02);
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    gap: 0.75rem;
  }

  .ai-chat-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    color: #fff;
    font-family: inherit;
    font-size: 0.9rem;
  }

  .ai-chat-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .ai-chat-send {
    background: var(--accent);
    color: #0c0f14;
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ai-chat-send:hover {
    transform: translateY(-2px);
  }

  .typing-indicator {
    display: none;
    padding: 1rem;
    color: var(--text-muted);
    font-size: 0.8rem;
    font-style: italic;
  }

  @media (max-width: 480px) {
    .ai-chat-window {
      width: calc(100vw - 2rem);
      right: -1rem;
      height: 70vh;
    }
  }
</style>

<div class="ai-chat-widget">
  <div class="ai-chat-window" id="aiChatWindow">
    <div class="ai-chat-header">
      <div class="status-dot"></div>
      <div>
        <div style="font-weight: 700; font-size: 1.1rem;">Tournament Assistant</div>
        <div style="font-size: 0.75rem; color: var(--text-muted);">Always here to help</div>
      </div>
      <button onclick="toggleAiChat()" style="background:none; border:none; color:var(--text-muted); margin-left:auto; cursor:pointer;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="ai-chat-messages" id="aiChatMessages">
      <div class="ai-msg ai-msg--bot">
        Hello! I'm your Metro Lanes Assistant. Ask me anything about our competitions, fees, or game modes!
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator">Assistant is thinking...</div>
    <div class="ai-chat-input-area">
      <input type="text" class="ai-chat-input" id="aiChatInput" placeholder="Ask a question..." onkeypress="handleChatKey(event)">
      <button class="ai-chat-send" onclick="sendAiMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
  
  <div class="ai-chat-bubble" onclick="toggleAiChat()">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </div>
</div>

<script>
  let chatHistory = [];
  const windowEl = document.getElementById('aiChatWindow');
  const messagesEl = document.getElementById('aiChatMessages');
  const inputEl = document.getElementById('aiChatInput');
  const typingEl = document.getElementById('typingIndicator');

  function toggleAiChat() {
    windowEl.style.display = windowEl.style.display === 'flex' ? 'none' : 'flex';
    if (windowEl.style.display === 'flex') {
      inputEl.focus();
    }
  }

  function handleChatKey(e) {
    if (e.key === 'Enter') sendAiMessage();
  }

  async function sendAiMessage() {
    const msg = inputEl.value.trim();
    if (!msg) return;

    // Add user message to UI
    addMessage(msg, 'user');
    inputEl.value = '';
    
    // Show typing indicator
    typingEl.style.display = 'block';
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const response = await fetch('{% url "chat_assistant" %}', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({
          message: msg,
          history: chatHistory
        })
      });

      const data = await response.json();
      
      typingEl.style.display = 'none';
      
      if (data.response) {
        addMessage(data.response, 'bot');
        chatHistory.push({role: 'user', content: msg});
        chatHistory.push({role: 'assistant', content: data.response});
      } else {
        addMessage("Sorry, I'm having trouble connecting right now.", 'bot');
      }
    } catch (e) {
      typingEl.style.display = 'none';
      addMessage("Sorry, something went wrong.", 'bot');
    }
  }

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `ai-msg ai-msg--${role}`;
    div.innerText = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
